<div class="auth-container">
  <div class="auth-banner">
    <div class="mosaic-grid">
      <div class="mosaic-item" style="background-image: url('/assets/images/img1.jpg');"></div>
      <div class="mosaic-item" style="background-image: url('/assets/images/img2.jpg');"></div>
      <div class="mosaic-item" style="background-image: url('/assets/images/img3.jpg');"></div>
      <div class="mosaic-item" style="background-image: url('/assets/images/img4.jpg');"></div>
    </div>
    
    <div class="banner-overlay"></div>

    <div class="banner-content">
      <p>System Dynamics</p>
      <h1>ATOMIC FLOW</h1>
    </div>
  </div>

  <div class="auth-form-wrapper">
    <div class="login-card">
      <div class="text-center">
        <img src="assets/logo-atomo.svg" alt="Átomo Logo" class="logo-atomo">
        <h2>RECUPERAR</h2>
        <p class="subtitle">Access Restoration</p>
      </div>

      <div class="instruction-box">
        <p>Ingresa el correo que registraste. Te enviaremos un enlace cifrado para restaurar tu acceso al sistema.</p>
      </div>

      <form (ngSubmit)="onRecover()">
        <div class="custom-input-group">
          <label>Correo Electrónico</label>
          <div class="input-wrapper">
            <i class="fa fa-paper-plane"></i>
            <input 
              type="email" 
              name="email"
              [(ngModel)]="email"
              placeholder="usuario@atomo.com" 
              required>
          </div>
        </div>

        <button type="submit" class="btn-atomo" [disabled]="isLoading">
          {{ isLoading ? 'ENVIANDO...' : 'ENVIAR ENLACE' }}
        </button>

        <div class="text-center mt-5">
          <a routerLink="/auth/login" class="back-link">
            <i class="fa fa-chevron-left me-2"></i> VOLVER AL LOGIN
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
