<div class="auth-container">
  <div class="auth-banner">
    <div class="mosaic-grid">
      <div class="mosaic-item" style="background-image: url('/assets/images/img1.jpg');"></div>
      <div class="mosaic-item" style="background-image: url('/assets/images/img2.jpg');"></div>
      <div class="mosaic-item" style="background-image: url('/assets/images/img3.jpg');"></div>
      <div class="mosaic-item" style="background-image: url('/assets/images/img4.jpg');"></div>
    </div>
    
    <div class="banner-overlay"></div>

    <div class="banner-content">
      <p>System Dynamics</p>
      <h1>ATOMIC FLOW</h1>
    </div>
  </div>

  <div class="auth-form-wrapper">
    <div class="login-card">
      <div class="text-center">
        <img src="assets/logo-atomo.svg" alt="Átomo Logo" class="logo-atomo">
        <h2>SEGURIDAD</h2>
        <p class="subtitle">Update Access Key</p>
      </div>

      <p class="instruction-text">Por favor, ingresa tu nueva contraseña segura para actualizar tu cuenta de Átomo.</p>

      <form (ngSubmit)="onUpdatePassword()">
        <div class="custom-input-group">
          <label>Nueva Contraseña</label>
          <div class="input-wrapper">
            <i class="fa fa-key"></i>
            <input 
              type="password" 
              name="newPassword"
              [(ngModel)]="newPassword" 
              placeholder="••••••••••••" 
              required>
          </div>
        </div>

        <div class="custom-input-group">
          <label>Confirmar Contraseña</label>
          <div class="input-wrapper">
            <i class="fa fa-shield-check"></i>
            <input 
              type="password" 
              name="confirmPassword"
              [(ngModel)]="confirmPassword" 
              placeholder="••••••••••••" 
              required>
          </div>
        </div>

        <button type="submit" class="btn-atomo">
          GUARDAR Y ENTRAR
        </button>

        <div class="text-center mt-4">
          <a routerLink="/auth/login" class="back-link">VOLVER AL LOGIN</a>
        </div>
      </form>
    </div>
  </div>
</div>
